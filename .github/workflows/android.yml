name: Build APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project & Build APK
      run: |
        cordova create app com.daniel.juegoavatar "Juego Avatar"
        cd app
        rm -rf www/*
        cp -r ../index.html ../style.css ../script.js ../assets ./www/
        if [ -f ../config.xml ]; then cp ../config.xml ./config.xml; fi
        cordova platform add android
        cordova build android --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: juego-avatar-apk
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
