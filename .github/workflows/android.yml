name: Build APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project & Build APK
      run: |
        cordova create app com.daniel.juegoavatar "Juego Avatar"
        cd app
        rm -rf www/*
        
        # EL ROBOT BUSCA AUTOMÁTICAMENTE DÓNDE QUEDÓ TU INDEX.HTML
        TARGET_DIR=$(find .. -maxdepth 3 -name "index.html" -exec dirname {} \;)
        
        echo "El robot encontró tus archivos en: $TARGET_DIR"
        
        # Copia los archivos usando la ruta que el robot descubrió sola
        cp -r "$TARGET_DIR/index.html" "$TARGET_DIR/style.css" "$TARGET_DIR/script.js" "$TARGET_DIR/assets" ./www/
        
        if [ -f "$TARGET_DIR/config.xml" ]; then cp "$TARGET_DIR/config.xml" ./config.xml; fi
        
        cordova platform add android
        cordova build android --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: juego-avatar-apk
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
