<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Avatar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-movil">
        <div class="pantalla-avatar">
            <img id="capa-cuerpo" src="assets/cuerpo.svg" alt="Cuerpo Base">
            <img id="capa-cabello" src="assets/pelo1.svg" alt="Cabello" style="display: none;">
            <img id="capa-ropa" src="assets/ropa1.svg" alt="Ropa" style="display: none;">
        </div>

        <div class="panel-control">
            <div class="control-color">
                <label for="color-pelo">🎨 Color de Pelo:</label>
                <input type="range" id="color-pelo" min="0" max="360" value="0">
            </div>

            <div class="pestanas">
                <button id="tab-cabello" class="btn-tab active">👩‍🦰 Cabello</button>
                <button id="tab-ropa" class="btn-tab">👗 Ropa</button>
            </div>

            <div id="contenedor-opciones" class="cuadricula-opciones"></div>

            <button id="btn-guardar" class="btn-principal">Guardar Muñequita ✨</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
