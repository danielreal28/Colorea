<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cute Anime Avatar Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-movil">
        <!-- PANTALLA DEL AVATAR (Muestra el zoom del avatar seleccionado) -->
        <div class="pantalla-avatar">
            <div class="enfoque-avatar">
                <img id="capa-cuerpo" src="assets/avatar_sheet.jpg" alt="Avatar Seleccionado">
            </div>
        </div>

        <!-- PANEL DE CONTROL (Glassmorphism) -->
        <div class="panel-control">
            
            <!-- Barra de Color (Filtro estético para personalizar el tono) -->
            <div class="control-color">
                <span>🎨 Tono del Personaje:</span>
                <input type="range" id="color-pelo" min="0" max="360" value="0">
            </div>

            <!-- Menú de Categorías (Pestañas para filtrar las caritas) -->
            <div class="pestanas-menu">
                <button id="tab-rostro" class="btn-tab active">👀 Rostro</button>
                <button id="tab-cabello" class="btn-tab">💇‍♀️ Pelo</button>
                <button id="tab-ropa" class="btn-tab">👗 Especial</button>
            </div>

            <!-- El Armario (Aquí el script.js mete los cuadritos recortados automáticamente) -->
            <div id="armario-opciones" class="cuadricula-armario"></div>

            <!-- Botón de Guardar -->
            <button id="btn-guardar" class="btn-guardar-avatar">Guardar Avatar ✨</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
